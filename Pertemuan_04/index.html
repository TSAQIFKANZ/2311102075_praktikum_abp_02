<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas AJAX</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: 
                linear-gradient(135deg, #74ebd5, #ACB6E5),
                url("https://www.transparenttextures.com/patterns/cubes.png");
            background-blend-mode: overlay;
            background-repeat: no-repeat, repeat;
            background-attachment: fixed;
            animation: geserCorak 15s linear infinite;
        }

        @keyframes geserCorak {
            0% { background-position: 0 0, 0 0; }
            100% { background-position: 0 0, 500px 0; }
        }

        .card {
            border: none;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            border-radius: 15px 15px 0 0;
            background: transparent;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .text-gradient {
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .btn-custom-gradient {
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            background-size: 200% auto;
            color: white;
            border: none;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-custom-gradient:hover {
            background-position: right center;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(116, 235, 213, 0.4);
        }

        #hasil-profil {
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.6) !important;
            backdrop-filter: blur(5px);
            color: #2c3e50;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.5s ease;
            opacity: 0;
            padding: 1.25rem; 
            margin-top: 1rem;
        }

        #hasil-profil.show {
            opacity: 1;
        }

        .footer-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding-bottom: 20px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body class="d-flex align-items-center position-relative">

    <div class="container">
        <div class="card shadow-lg mx-auto" style="max-width: 500px;">
            
            <div class="card-header text-center py-3">
                <h4 class="mb-0 text-gradient">📋 Data Profil</h4>
            </div>

            <div class="card-body text-center p-4">
                <button id="tombol-profil" class="btn btn-custom-gradient rounded-pill px-4 py-2 shadow-sm">
                    Tampilkan Profil
                </button>

                <div id="hasil-profil" class="d-none"></div>
            </div>

        </div>
    </div>

    <div class="footer-overlay">
        <small>&copy; 2026 Aplikasi Berbasis Platform. All Rights Reserved.</small>
    </div>

    <script>
        const tombol = document.getElementById("tombol-profil");
        const hasil = document.getElementById("hasil-profil");

        tombol.addEventListener("click", function () {
            
            if (tombol.innerText === "Refresh halaman") {
                location.reload();
                return;
            }

            fetch("data.php")
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Jaringan bermasalah");
                    }
                    return response.json();
                })
                .then(data => {
                    hasil.classList.remove("d-none");
                    hasil.innerHTML = `
                        <strong>Nama:</strong> ${data.nama} <br>
                        <strong>Pekerjaan:</strong> ${data.pekerjaan} <br>
                        <strong>Lokasi:</strong> ${data.lokasi}
                    `;

                    setTimeout(() => {
                        hasil.classList.add("show");
                    }, 100);

                    tombol.innerText = "Refresh halaman";
                })
                .catch(error => {
                    hasil.classList.remove("d-none");
                    hasil.innerHTML = "<span style='color: #e74c3c; font-weight: 600;'>Gagal memuat data dari server.</span>";
                    setTimeout(() => { hasil.classList.add("show"); }, 100);
                    console.error("Fetch Error:", error);
                });
        });
    </script>

</body>
</html>
